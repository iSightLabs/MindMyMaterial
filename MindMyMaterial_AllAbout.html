<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All About — Mind My Material</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   BRAND & MATERIAL COLORS
   Change hex values here to restyle colors
══════════════════════════════════════════ */
:root {
  --amber:#d8973c; --amber-lt:#e8b86d; --rust:#bd632f;
  --navy:#273e47; --teal:#335a70; --cream:#e8dfc4; --cream-dk:#c9bfa0;
  --bg:#1a2a32; --surface:#1f3340; --surface2:#253d4d;
  --border:rgba(232,223,196,0.08); --muted:#7a9aaa;
  /* Material accent colors — one per material */
  --composite:#9a8abf; --metal:#8fa8bc; --ceramic:#c4b59a;
  --polymer:#6daa7a;   --natural:#8aaa5a; --elastomer:#c4835a; --foam:#7ab8cc;
  /* Active material color — set by JS on page load */
  --mat-color:#d8973c;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:var(--bg); color:var(--cream);
  font-family:'DM Sans',sans-serif; font-weight:300;
  min-height:100vh; overflow-x:hidden;
}
/* Ambient background glow */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 80% 0%, rgba(var(--mat-rgb),.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 10% 90%, rgba(39,62,71,.5) 0%, transparent 60%);
}

/* ── PAGE WRAPPER ── */
.page { max-width:860px; margin:0 auto; padding:40px 24px 100px; position:relative; z-index:1; }

/* ── NAV BAR ── */
.topbar {
  position:sticky; top:0; z-index:20;
  background:rgba(26,42,50,.92); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  padding:12px 24px; display:flex; align-items:center; gap:16px;
}
.topbar-logo { width:28px; opacity:.7; flex-shrink:0; }
.topbar-logo svg { width:100%; height:auto; }
.topbar-title { font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:.1em; color:var(--muted); flex:1; }
.nav-links { display:flex; gap:16px; }
.nav-link {
  font-size:12px; letter-spacing:.08em; color:var(--muted);
  text-decoration:none; transition:color .2s;
}
.nav-link:hover, .nav-link.active { color:var(--amber); }

/* ── HERO ── */
.hero {
  padding:56px 0 40px; text-align:center;
  border-bottom:1px solid var(--border); margin-bottom:40px;
  position:relative;
}
.hero::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 100% at 50% 0%, var(--mat-color) 0%, transparent 60%);
  opacity:.08; pointer-events:none;
}
.eyebrow {
  font-size:11px; letter-spacing:.22em; text-transform:uppercase;
  color:var(--amber); margin-bottom:12px; display:block;
}
.mat-symbol {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(60px,10vw,96px);
  line-height:1; color:var(--mat-color);
  filter:drop-shadow(0 0 24px var(--mat-color));
  margin-bottom:4px;
}
.mat-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(48px,8vw,80px);
  letter-spacing:.06em; color:var(--mat-color); line-height:1;
  margin-bottom:14px;
}
.mat-tagline {
  font-size:16px; color:var(--muted); font-style:italic; line-height:1.7;
  max-width:420px; margin:0 auto 20px;
}
/* Material switcher pills */
.mat-switcher {
  display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-top:24px;
}
.mat-pill {
  padding:5px 14px; border-radius:100px; border:1px solid;
  font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:.1em;
  cursor:pointer; transition:all .2s; text-decoration:none; opacity:.55;
}
.mat-pill:hover  { opacity:.85; transform:translateY(-1px); }
.mat-pill.active { opacity:1; }

/* ── SECTION LAYOUT ── */
.section { margin-bottom:48px; }
.section-header {
  display:flex; align-items:center; gap:12px; margin-bottom:20px;
}
.section-num {
  font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:.18em;
  color:var(--mat-color); background:rgba(255,255,255,.04);
  border:1px solid var(--border); border-radius:4px;
  padding:3px 8px; flex-shrink:0;
}
h2 {
  font-family:'Bebas Neue',sans-serif; font-size:20px;
  letter-spacing:.14em; color:var(--cream);
}
.rule { width:100%; height:1px; background:linear-gradient(90deg,transparent,rgba(216,151,60,.2),transparent); margin:36px 0; }

/* ── PROFILE CARDS (top 5 / bottom 5 traits) ── */
.trait-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px;
}
.trait-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; transition:border-color .2s;
}
.trait-card:hover { border-color:rgba(232,223,196,.18); }
.trait-card.high { border-left:3px solid var(--mat-color); }
.trait-card.low  { border-left:3px solid rgba(122,154,170,.3); }
.trait-name  { font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:.06em; color:var(--cream); margin-bottom:3px; }
.trait-prop  { font-size:11px; color:var(--muted); margin-bottom:8px; }
.trait-bar   { height:5px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.trait-bar-fill { height:100%; border-radius:3px; transition:width 1s ease; width:0; }
.trait-rank  { font-size:11px; color:var(--muted); margin-top:5px; text-align:right; }

/* ── FULL PROPERTY TABLE ── */
.prop-list { display:flex; flex-direction:column; gap:8px; }
.prop-row {
  display:grid; grid-template-columns:140px 1fr 36px;
  align-items:center; gap:12px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:10px 14px; transition:border-color .2s;
}
.prop-row:hover { border-color:rgba(232,223,196,.15); }
.prop-label { font-size:12px; color:var(--cream); opacity:.85; line-height:1.35; }
.prop-trait { font-size:10px; color:var(--muted); margin-top:2px; }
.prop-bar-track { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.prop-bar-fill  { height:100%; border-radius:3px; transition:width 1.2s ease; width:0; }
.prop-rank-badge {
  font-family:'Bebas Neue',sans-serif; font-size:16px;
  color:var(--mat-color); text-align:right;
}

/* ── MBTI / PSYCH SUMMARY CARDS ── */
.info-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px;
}
.info-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:18px 20px;
}
.info-card-label {
  font-size:10px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--amber); margin-bottom:6px;
}
.info-card-value {
  font-family:'Bebas Neue',sans-serif; font-size:20px;
  letter-spacing:.06em; color:var(--cream); margin-bottom:6px;
}
.info-card-desc { font-size:13px; color:var(--muted); line-height:1.6; }

/* ── COMPARE CTA ── */
.compare-cta {
  background:linear-gradient(135deg, rgba(154,138,191,.12), rgba(143,168,188,.08));
  border:1px solid rgba(154,138,191,.25); border-radius:16px;
  padding:32px; text-align:center; margin-top:48px;
}
.compare-cta h2 { color:var(--cream); margin-bottom:10px; }
.compare-cta p  { color:var(--muted); font-size:14px; line-height:1.7; margin-bottom:24px; }
.btn-primary {
  display:inline-block; padding:14px 36px; border-radius:100px;
  background:var(--amber); color:var(--navy);
  font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:.12em;
  text-decoration:none; transition:all .2s;
}
.btn-primary:hover { background:var(--amber-lt); transform:translateY(-2px); box-shadow:0 8px 24px rgba(216,151,60,.3); }
.btn-secondary {
  display:inline-block; padding:12px 28px; border-radius:100px;
  border:1px solid var(--border); color:var(--muted);
  font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:.1em;
  text-decoration:none; transition:all .2s; margin-left:12px;
}
.btn-secondary:hover { border-color:var(--amber); color:var(--amber); }

@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.fade { animation:fadeUp .45s ease both; }
</style>
</head>

  natural:   { name:'Natural',   symbol:'Org',   color:'#8aaa5a' },
  elastomer: { name:'Elastomer', symbol:'C₄H₆',  color:'#c4835a' },
  foam:      { name:'Foam',      symbol:'PU',    color:'#7ab8cc' },
};
const MAT_ORDER = ['composite','metal','ceramic','polymer','natural','elastomer','foam'];

/* ══════════════════════════════════════════════════════════
   PAGE BUILDER — reads URL hash and renders the correct material
   Called on load and on hash change (when user switches materials)
══════════════════════════════════════════════════════════ */
function buildPage() {
  // Read material from URL hash, default to composite
  const hash = location.hash.replace('#','').toLowerCase();
  const matKey = MAT_ORDER.includes(hash) ? hash : 'composite';
  const mat    = MATERIALS[matKey];
  const prof   = PROFILES[matKey];

  // Set CSS color variable for glow effects
  document.documentElement.style.setProperty('--mat-color', mat.color);

  // Update page title
  document.title = 'All About ' + mat.name + ' — Mind My Material';

  // Update active pill in switcher
  document.querySelectorAll('.mat-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.mat === matKey);
  });

  const el = document.getElementById('pageContent');
  el.innerHTML = '';
  el.className = 'page fade';

  // Sort all properties by this material's rank, descending
  const sorted = [...PROPS].sort((a,b) => b.ranks[matKey] - a.ranks[matKey]);
  const top5   = sorted.slice(0, 5);
  const bot5   = sorted.slice(-5).reverse();

  // Compute average rank for this material
  const avg = (PROPS.reduce((s,p) => s + p.ranks[matKey], 0) / PROPS.length).toFixed(1);
  const rankAmong = MAT_ORDER.slice().sort((a,b) =>
    PROPS.reduce((s,p)=>s+p.ranks[b],0) - PROPS.reduce((s,p)=>s+p.ranks[a],0)
  ).indexOf(matKey) + 1;

  // ── HERO SECTION ──
  el.innerHTML += '<span class="eyebrow">Your mental material</span>' +
    '<div class="mat-symbol">' + mat.symbol + '</div>' +
    '<h1 class="mat-name">' + mat.name + '</h1>' +
    '<p class="mat-tagline">' + prof.tagline + '</p>' +
    '<div class="mat-switcher" id="switcher"></div>';

  // Build switcher pills (done after innerHTML set)
  const sw = document.getElementById('switcher');
  MAT_ORDER.forEach(mk => {
    const m = MATERIALS[mk];
    const a = document.createElement('a');
    a.className = 'mat-pill' + (mk === matKey ? ' active' : '');
    a.dataset.mat = mk;
    a.href = '#' + mk;
    a.textContent = m.name;
    a.style.cssText = 'color:' + m.color + ';border-color:' + m.color;
    sw.appendChild(a);
  });

  // ── SECTION 1: WHO YOU ARE ──
  el.innerHTML +=
    '<div class="rule"></div>' +
    '<div class="section">' +
      '<div class="section-header"><span class="section-num">01</span><h2>Who you are</h2></div>' +
      '<p style="margin-bottom:14px;">' + prof.summary + '</p>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;">' +
        '<div class="info-card">' +
          '<div class="info-card-label">Strengths</div>' +
          '<div class="info-card-desc">' + prof.strengths + '</div>' +
        '</div>' +
        '<div class="info-card">' +
          '<div class="info-card-label">Challenges</div>' +
          '<div class="info-card-desc">' + prof.challenges + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';

  // ── SECTION 2: PSYCH & MBTI ──
  el.innerHTML +=
    '<div class="section">' +
      '<div class="section-header"><span class="section-num">02</span><h2>Psychology & MBTI</h2></div>' +
      '<div class="info-grid">' +
        '<div class="info-card"><div class="info-card-label">Archetype</div><div class="info-card-value">' + prof.archetype + '</div></div>' +
        '<div class="info-card"><div class="info-card-label">Likely MBTI</div><div class="info-card-value">' + prof.mbti + '</div></div>' +
        '<div class="info-card"><div class="info-card-label">Big Five Alignment</div><div class="info-card-desc">' + prof.psych + '</div></div>' +
        '<div class="info-card"><div class="info-card-label">Overall Rank (avg)</div>' +
          '<div class="info-card-value">#' + rankAmong + ' of 7</div>' +
          '<div class="info-card-desc">Avg property rank: ' + avg + '/7</div>' +
        '</div>' +
      '</div>' +
    '</div>';

  // ── SECTION 3: TOP 5 STRENGTHS ──
  let top5html = '<div class="trait-grid">';
  top5.forEach(p => {
    const pct = Math.round(p.ranks[matKey] / 7 * 100);
    top5html +=
      '<div class="trait-card high">' +
        '<div class="trait-name">' + p.trait + '</div>' +
        '<div class="trait-prop">' + p.property + ' · ' + p.symbol + '</div>' +
        '<div class="trait-bar"><div class="trait-bar-fill" style="background:' + mat.color + '" data-pct="' + pct + '"></div></div>' +
        '<div class="trait-rank">Rank ' + p.ranks[matKey] + '/7 · ' + p.rank_def + '</div>' +
      '</div>';
  });
  top5html += '</div>';
  el.innerHTML +=
    '<div class="section">' +
      '<div class="section-header"><span class="section-num">03</span><h2>Your five strongest traits</h2></div>' +
      top5html +
    '</div>';

  // ── SECTION 4: BOTTOM 5 (growth areas) ──
  let bot5html = '<div class="trait-grid">';
  bot5.forEach(p => {
    const pct = Math.round(p.ranks[matKey] / 7 * 100);
    bot5html +=
      '<div class="trait-card low">' +
        '<div class="trait-name">' + p.trait + '</div>' +
        '<div class="trait-prop">' + p.property + ' · ' + p.symbol + '</div>' +
        '<div class="trait-bar"><div class="trait-bar-fill" style="background:rgba(122,154,170,0.4)" data-pct="' + pct + '"></div></div>' +
        '<div class="trait-rank">Rank ' + p.ranks[matKey] + '/7 · ' + p.rank_def + '</div>' +
      '</div>';
  });
  bot5html += '</div>';
  el.innerHTML +=
    '<div class="section">' +
      '<div class="section-header"><span class="section-num">04</span><h2>Growth opportunities</h2></div>' +
      '<p style="font-size:13px;color:var(--muted);margin-bottom:16px;">The five properties where ' + mat.name + ' ranks lowest — not weaknesses, but areas of greatest potential growth.</p>' +
      bot5html +
    '</div>';

  // ── SECTION 5: ALL 43 PROPERTIES ──
  let allHtml = '<div class="prop-list">';
  sorted.forEach(p => {
    const pct = Math.round(p.ranks[matKey] / 7 * 100);
    allHtml +=
      '<div class="prop-row">' +
        '<div><div class="prop-label">' + p.property + '</div><div class="prop-trait">' + p.trait + '</div></div>' +
        '<div class="prop-bar-track"><div class="prop-bar-fill" style="background:' + mat.color + '" data-pct="' + pct + '"></div></div>' +
        '<div class="prop-rank-badge">' + p.ranks[matKey] + '</div>' +
      '</div>';
  });
  allHtml += '</div>';
  el.innerHTML +=
    '<div class="section">' +
      '<div class="section-header"><span class="section-num">05</span><h2>All 43 properties</h2></div>' +
      '<p style="font-size:13px;color:var(--muted);margin-bottom:16px;">Every property ranked 1–7 (7 = highest for that material). Sorted by strength.</p>' +
      allHtml +
    '</div>';

  // ── COMPARE CTA ──
  el.innerHTML +=
    '<div class="compare-cta">' +
      '<h2>How do you compare to others?</h2>' +
      '<p>See all 7 materials ranked side by side across all 43 properties — find out where your material leads, where it lags, and how it stacks up.</p>' +
      '<a class="btn-primary" href="MindMyMaterial_Compare.html#' + matKey + '">Open Full Comparison →</a>' +
      '<a class="btn-secondary" href="MindMyMaterial_App_v9.html">Retake the test</a>' +
    '</div>';

  // Animate bars in after DOM settles
  setTimeout(() => {
    document.querySelectorAll('[data-pct]').forEach(b => { b.style.width = b.dataset.pct + '%'; });
  }, 120);
}

// Listen for hash changes (user clicks a material pill)
window.addEventListener('hashchange', buildPage);
// Build on first load
window.addEventListener('DOMContentLoaded', buildPage);
</script>
</body>
</html>
